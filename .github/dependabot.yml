# GitHub Dependabot configuration
# Note: there is no interaction between this configuration and Dependabot
# security updates.
# See here for more information:
# https://docs.github.com/en/code-security/dependabot/dependabot-security-updates/about-dependabot-security-updates#about-dependabot-security-updates

version: 2
updates:
  # GitHub Actions checks
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every month.
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  # Perform checks and updates for the Python uv environment.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      # Check for updates to uv environment files every month.
      interval: "monthly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      python-packages:
        patterns:
          - "*"

  # Perform checks and updates for pre-commit hook versions.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      # Check for updates to pre-commit hooks every month.
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
